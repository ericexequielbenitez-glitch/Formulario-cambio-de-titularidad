<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de llamada para Cambio de Titularidad</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#1fa2d6,#2bc0e4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  width: 420px;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  overflow-y: auto;
  max-height: 95vh;
}

.logo { text-align:center; margin-bottom:15px; }
.logo img { width:140px; }

input, select {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:12px;
  background:#0099cc;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled { background:#7fbfd4; }

.message { margin-top:20px; text-align:center; font-weight:bold; }
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h3>Cambio de Titularidad</h3>

<form id="formulario">

<input type="text" name="dni_actual" placeholder="DNI titular actual" required>
<input type="text" name="dni_nuevo" placeholder="DNI titular nuevo" required>
<input type="text" name="nombre_nuevo" placeholder="Nombre titular nuevo" required>
<input type="tel" name="telefono_nuevo" placeholder="Teléfono contacto" required>

<label>Foto Frente DNI</label>
<input type="file" id="fotoFrente" accept="image/*" required>

<label>Foto Dorso DNI</label>
<input type="file" id="fotoDorso" accept="image/*" required>

<input type="hidden" name="motivo" value="Cambio de titularidad">

<label>Fecha a llamar</label>
<input type="date" name="fecha_llamar" required>

<label>Horario</label>
<select name="horario_llamar" required>
<option value="">Seleccionar</option>
<option>Lo antes posible</option>
<option>A la mañana</option>
<option>A la tarde</option>
<option>A la noche</option>
</select>

<button type="submit">Enviar solicitud</button>

</form>

<div class="message" id="mensaje"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbw3CX4UGavVZJ8dO5MEyIQHWl_eElE6rRvzYj6CAT5HMWdVvsNma47aW9WpMWSIBI4I/exec";

const form = document.getElementById("formulario");
const mensaje = document.getElementById("mensaje");
const btn = form.querySelector("button");

function convertirBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });
}

form.addEventListener("submit", async function(e){
  e.preventDefault();

  btn.disabled = true;
  btn.innerText = "Enviando...";

  const fileFrente = document.getElementById("fotoFrente").files[0];
  const fileDorso = document.getElementById("fotoDorso").files[0];

  const base64Frente = await convertirBase64(fileFrente);
  const base64Dorso = await convertirBase64(fileDorso);

  const formData = new FormData(form);
  formData.append("foto_frente", base64Frente);
  formData.append("foto_dorso", base64Dorso);

  fetch(scriptURL,{
    method:"POST",
    body: formData
  })
  .then(res=>res.text())
  .then(result=>{
      if(result === "YA_EXISTE"){
          mensaje.innerText = "Ya registraste una solicitud en las últimas 24hs.";
      } else {
          mensaje.innerText = "Solicitud registrada. Nº de caso: " + result;
      }
      btn.style.display="none";
      form.style.display="none";
  })
  .catch(()=> alert("Error al enviar"));
});
</script>

</body>
</html>
